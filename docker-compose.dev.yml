version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base
    container_name: nexmeet-backend-dev
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file: ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5000:5000"
    networks:
      - nexmeet-dev

  frontend:
    image: node:20-alpine
    container_name: nexmeet-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nexmeet-dev

networks:
  nexmeet-dev:
    driver: bridge
